name: Update tracker and publish site

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write
  pages: write
  id-token: write
  models: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ingest latest videos
        run: python -m scripts.ingest --limit-per-channel 5

      - name: Summarize transcript-backed videos
        env:
          GITHUB_TOKEN: ${{ github.token }}
          WEBSHARE_USER: ${{ secrets.WEBSHARE_USER }}
          WEBSHARE_PASS: ${{ secrets.WEBSHARE_PASS }}
          YT_DLP_PROXY_URL: ${{ secrets.YT_DLP_PROXY_URL }}
        run: python -m scripts.summarize --max-videos 12

      - name: Build static site
        run: python -m scripts.build_site

      - name: Build frontend bundle
        run: python -m scripts.build_frontend

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data site
          git diff --cached --quiet || git commit -m "Update LLM YouTube tracker"
          git push

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - uses: actions/deploy-pages@v4
