<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>LLM YouTube Landscape Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    /* Bold, legible — slate ink, sage paper, red signal */
    --bg:        #eff6ee;
    --bg-card:   #ffffff;
    --bg-sunk:   #e4ecdf;
    --rule:      #cdd5cb;
    --rule-soft: #dfe6dc;
    --ink:       #273043;
    --ink-mute:  #9197ae;
    --ink-soft:  #b4b9c9;
    --accent:    #f02d3a;
    --accent-2:  #dd0426;
    --good:      #2f7d4f;
    --warn:      #b97a00;
    --bad:       #dd0426;
    --row-h:     60px;
    --gutter:    24px;
    --radius:    12px;
    --radius-sm: 8px;
    --serif:     "DM Sans", system-ui, -apple-system, sans-serif;
    --body:      "DM Sans", system-ui, -apple-system, sans-serif;
    --sans:      "DM Sans", system-ui, -apple-system, sans-serif;
    --mono:      "JetBrains Mono", ui-monospace, Menlo, monospace;
  }
  [data-theme="dark"] {
    --bg:        #1a1f2e;
    --bg-card:   #232a3d;
    --bg-sunk:   #141826;
    --rule:      #3a4258;
    --rule-soft: #2e3548;
    --ink:       #eff6ee;
    --ink-mute:  #9197ae;
    --ink-soft:  #6c7390;
    --accent:    #f02d3a;
    --accent-2:  #dd0426;
  }
  [data-theme="sepia"] {
    --bg:        #f5ede1;
    --bg-card:   #fbf6ed;
    --bg-sunk:   #ebe1cf;
    --rule:      #d8c8a8;
    --rule-soft: #e5d9c0;
    --ink:       #2d2417;
    --accent:    #dd0426;
  }
  [data-density="compact"] { --row-h: 44px; }
  [data-density="dense"]   { --row-h: 34px; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: var(--sans); font-size: 15px; line-height: 1.45; -webkit-font-smoothing: antialiased; font-feature-settings: "kern", "ss01"; letter-spacing: -0.005em; }
  a { color: inherit; }
  ::selection { background: oklch(from var(--accent) l c h / 0.25); }
  .mono { font-family: var(--mono); font-feature-settings: "ss01", "zero"; }
  .serif { font-family: var(--serif); }
  button { font: inherit; color: inherit; background: none; border: 0; padding: 0; cursor: pointer; }
  input, select { font: inherit; color: inherit; }
</style>
<script type="application/json" id="initial-tweaks">
{
  "density": "comfortable",
  "theme": "light",
  "relView": "heatmap",
  "showLog": true
}
</script>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="data.js"></script>
<script src="assets/app.js"></script>
</body>
</html>
